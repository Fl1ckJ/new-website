name: Notion → Blog sync

on:
  workflow_dispatch:        # manual "Run workflow" button in the Actions tab
  schedule:
    - cron: "*/15 * * * *"  # also auto-checks Notion every 15 minutes

permissions:
  contents: write           # allow the job to commit the synced files back

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Sync from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node sync-notion.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "notion-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes — nothing to publish."
          else
            git commit -m "chore: sync blog from Notion"
            git push
          fi
