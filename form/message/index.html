<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script>(function(){try{document.documentElement.dataset.theme=localStorage.getItem('steeltrace-theme')==='light'?'light':'dark';}catch(e){document.documentElement.dataset.theme='dark';}})();</script>
<title>Thank you: SteelTrace</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../../steeltrace/site.css" />
<style>
  .ty-wrap { min-height: 70vh; display: grid; place-items: center; text-align: center; padding: 60px 20px; }
  .ty-card { max-width: 520px; }
  .ty-check { width: 64px; height: 64px; margin: 0 auto 24px; border-radius: 50%; display: grid; place-items: center; color: var(--accent); background: var(--accent-soft); border: 1px solid var(--accent-dim); }
  .ty-card h1 { font-size: clamp(28px, 4vw, 40px); font-weight: 800; letter-spacing: -.03em; }
  .ty-card p { color: var(--txt-2); font-size: 16px; line-height: 1.65; margin-top: 16px; }
  .ty-card .btn { margin-top: 28px; }
</style>
</head>
<body>
<div class="aura a"></div><div class="aura b"></div>
<div class="gridbg"></div>
<div class="wrap">
  <div class="ty-wrap">
    <div class="ty-card">
      <div class="ty-check"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <h1>Thank you!</h1>
      <p>We received your submission. Our team will be in touch shortly, and any requested materials are on their way to your inbox.</p>
      <a class="btn btn-primary" href="../../SteelTrace%20Home.html">Back to home <span class="ar">→</span></a>
    </div>
  </div>
</div>
</body>
</html>
