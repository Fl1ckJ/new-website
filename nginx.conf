# SteelTrace — NGINX server config (production, steeltrace.ai)
# - Clean/extensionless URLs (/careers -> careers.html)
# - Security headers (fixes the site-wide Screaming Frog "Missing … Header" warnings)
#
# Deploy: put the site files in `root` below, drop this in /etc/nginx/sites-available/,
# symlink into sites-enabled/, then `nginx -t && systemctl reload nginx`.

server {
    listen 443 ssl http2;
    server_name steeltrace.ai www.steeltrace.ai;

    # ssl_certificate     /etc/letsencrypt/live/steeltrace.ai/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/steeltrace.ai/privkey.pem;

    root /var/www/steeltrace;      # <-- folder containing the .html files
    index index.html;

    # ---- clean URLs: /careers -> careers.html, /post?slug=x -> post.html ----
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # ---- security headers (apply to every response) ----
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # CSP allows the site's inline scripts/styles, Google Fonts, hCaptcha, and https images.
    # Test forms + captcha after enabling; tighten later (drop 'unsafe-inline' with nonces) if desired.
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.hcaptcha.com https://*.hcaptcha.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src 'self' https://*.hcaptcha.com; connect-src 'self' https:; form-action 'self' https:; base-uri 'self';" always;

    # ---- long cache for static assets, short for html ----
    location ~* \.(?:css|js|png|jpg|jpeg|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # optional: send bad paths to a styled 404 page
    # error_page 404 /404.html;
}

# redirect http -> https
server {
    listen 80;
    server_name steeltrace.ai www.steeltrace.ai;
    return 301 https://steeltrace.ai$request_uri;
}
