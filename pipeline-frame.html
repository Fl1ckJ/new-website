<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SteelTrace: Pipeline Frame</title>
<style>
  :root {
    --frame-bg: #02080f;
    --frame-border: rgba(255, 181, 71, 0.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--frame-bg); }

  /* Drop this whole .pipeline-frame block anywhere in your design.
     It auto-sizes to whatever container you put it in — set width/height
     on the wrapping element or let it fill the page. */
  .pipeline-frame {
    position: relative;
    width: 100%;
    height: 100vh;            /* change to a fixed height (e.g. 720px) if you embed inside a page */
    background: var(--frame-bg);
    border: 1px solid var(--frame-border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
  }
  .pipeline-frame iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  /* Optional caption strip at the top — remove if not wanted */
  .pipeline-frame::before {
    content: "STEELTRACE · PIPELINE JOURNEY";
    position: absolute;
    top: 12px; left: 16px;
    z-index: 2;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 10px;
    letter-spacing: 0.28em;
    color: rgba(234, 244, 255, 0.55);
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- ===== drop this block into your design ===== -->
<div class="pipeline-frame">
  <iframe
    src="pipeline-3d.html"
    title="SteelTrace 3D pipeline journey"
    loading="lazy"
    allow="fullscreen"
    referrerpolicy="no-referrer">
  </iframe>
</div>
<!-- =========================================== -->

</body>
</html>
