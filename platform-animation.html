<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Platform Animation</title>
<style>
  body { margin: 0; padding: 20px; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; }
  svg { width: 100%; height: auto; }
  .supplier { opacity: 0; }
  .supplier.active { animation: slideIn .6s ease forwards; }
  .record { opacity: 0; }
  .record.active { animation: slideOut .6s ease forwards; }
  .flow-line { opacity: 0; stroke-dasharray: 100; stroke-dashoffset: 100; }
  .flow-line.active { animation: drawLine .5s ease forwards; }
  @keyframes slideIn { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideOut { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes drawLine { to { stroke-dashoffset: 0; opacity: 1; } }
</style>
</head>
<body>
<div class="container">
<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Frame -->
  <rect x="80" y="60" width="1040" height="680" rx="20" fill="white" stroke="#1a1a1a" stroke-width="12"/>
  
  <!-- Header -->
  <circle cx="150" cy="130" r="10" fill="#16a79a"/>
  <text x="180" y="140" font-family="system-ui" font-size="18" font-weight="500" fill="#555">SteelTrace: supplier records</text>
  <text x="1020" y="140" font-family="system-ui" font-size="14" fill="#888" text-anchor="end">live</text>
  
  <!-- Left suppliers -->
  <!-- Supplier A -->
  <g class="supplier" style="animation-delay: 0s">
    <rect x="150" y="200" width="240" height="100" rx="12" fill="#fce5e0" stroke="#d4866f" stroke-width="2"/>
    <text x="270" y="230" font-family="system-ui" font-size="18" font-weight="600" fill="#b8421f" text-anchor="middle">Supplier A</text>
    <text x="270" y="260" font-family="system-ui" font-size="14" fill="#d4866f" text-anchor="middle">PDF scans</text>
  </g>
  
  <!-- Supplier B -->
  <g class="supplier" style="animation-delay: 0.15s">
    <rect x="150" y="350" width="240" height="100" rx="12" fill="#fef3e0" stroke="#d9a860" stroke-width="2"/>
    <text x="270" y="380" font-family="system-ui" font-size="18" font-weight="600" fill="#b8821f" text-anchor="middle">Supplier B</text>
    <text x="270" y="410" font-family="system-ui" font-size="14" fill="#d9a860" text-anchor="middle">CSV exports</text>
  </g>
  
  <!-- Supplier C -->
  <g class="supplier" style="animation-delay: 0.3s">
    <rect x="150" y="500" width="240" height="100" rx="12" fill="#ede8f7" stroke="#7c7ba0" stroke-width="2"/>
    <text x="270" y="530" font-family="system-ui" font-size="18" font-weight="600" fill="#4a3f7f" text-anchor="middle">Supplier C</text>
    <text x="270" y="560" font-family="system-ui" font-size="14" fill="#7c7ba0" text-anchor="middle">Email threads</text>
  </g>
  
  <!-- Flow lines in -->
  <line class="flow-line" x1="390" y1="250" x2="540" y2="320" stroke="#999" stroke-width="2" style="animation-delay: 0.5s"/>
  <line class="flow-line" x1="390" y1="400" x2="560" y2="400" stroke="#999" stroke-width="2" style="animation-delay: 0.65s"/>
  <line class="flow-line" x1="390" y1="550" x2="540" y2="480" stroke="#999" stroke-width="2" style="animation-delay: 0.8s"/>
  
  <!-- Center verify circle -->
  <circle cx="600" cy="400" r="80" fill="#16a79a"/>
  <g transform="translate(600, 380)">
    <rect x="-20" y="-10" width="40" height="20" fill="none" stroke="white" stroke-width="2" rx="2"/>
  </g>
  <text x="600" y="430" font-family="system-ui" font-size="18" font-weight="600" fill="white" text-anchor="middle">verify</text>
  
  <!-- Flow lines out -->
  <line class="flow-line" x1="660" y1="320" x2="810" y2="250" stroke="#999" stroke-width="2" style="animation-delay: 1.1s"/>
  <line class="flow-line" x1="680" y1="400" x2="840" y2="400" stroke="#999" stroke-width="2" style="animation-delay: 1.25s"/>
  <line class="flow-line" x1="660" y1="480" x2="810" y2="550" stroke="#999" stroke-width="2" style="animation-delay: 1.4s"/>
  
  <!-- Right records -->
  <!-- Record A -->
  <g class="record" style="animation-delay: 1.6s">
    <rect x="810" y="200" width="240" height="100" rx="12" fill="white" stroke="#ddd" stroke-width="2"/>
    <text x="930" y="230" font-family="system-ui" font-size="16" font-weight="600" fill="#333" text-anchor="middle">Record · Supplier</text>
    <text x="930" y="250" font-family="system-ui" font-size="16" font-weight="600" fill="#333" text-anchor="middle">A</text>
    <rect x="825" y="265" width="90" height="8" rx="2" fill="#ddd"/>
    <rect x="825" y="280" width="60" height="8" rx="2" fill="#ddd"/>
  </g>
  
  <!-- Record B -->
  <g class="record" style="animation-delay: 1.75s">
    <rect x="810" y="350" width="240" height="100" rx="12" fill="white" stroke="#ddd" stroke-width="2"/>
    <text x="930" y="380" font-family="system-ui" font-size="16" font-weight="600" fill="#333" text-anchor="middle">Record · Supplier B</text>
    <rect x="825" y="405" width="90" height="8" rx="2" fill="#ddd"/>
    <rect x="825" y="420" width="60" height="8" rx="2" fill="#ddd"/>
  </g>
  
  <!-- Record C -->
  <g class="record" style="animation-delay: 1.9s">
    <rect x="810" y="500" width="240" height="100" rx="12" fill="white" stroke="#ddd" stroke-width="2"/>
    <text x="930" y="530" font-family="system-ui" font-size="16" font-weight="600" fill="#333" text-anchor="middle">Record · Supplier</text>
    <text x="930" y="550" font-family="system-ui" font-size="16" font-weight="600" fill="#333" text-anchor="middle">C</text>
    <rect x="825" y="565" width="90" height="8" rx="2" fill="#ddd"/>
    <rect x="825" y="580" width="60" height="8" rx="2" fill="#ddd"/>
  </g>
  
  <!-- Center text -->
  <text x="600" y="690" font-family="system-ui" font-size="14" fill="#666" text-anchor="middle">one platform</text>
</svg>
</div>
<script>
  const suppliers = document.querySelectorAll('.supplier');
  const records = document.querySelectorAll('.record');
  const flowLines = document.querySelectorAll('.flow-line');
  
  function activate() {
    suppliers.forEach(el => el.classList.add('active'));
    records.forEach(el => el.classList.add('active'));
    flowLines.forEach(el => el.classList.add('active'));
  }
  
  // Trigger on load and repeat every 6 seconds
  activate();
  setInterval(activate, 6000);
</script>
</body>
</html>
