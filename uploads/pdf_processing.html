<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Processing</title>
<style>
  :root{--blue:#2c9fd9;--accent:#27b497;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;
       background:radial-gradient(circle at 50% 40%,#2e4a73 0%,#1b315a 45%,#10203c 100%);}

  .scene{position:relative;width:720px;height:560px;overflow:hidden;}

  /* ---------------- PDF documents ---------------- */
  .pdf{position:absolute;left:316px;top:154px;width:88px;height:112px;
       background:#fff;border-radius:7px;box-shadow:0 10px 24px rgba(0,0,0,.45);
       transform-origin:center;}
  .pdf .corner{position:absolute;top:0;right:0;border-width:0 18px 18px 0;border-style:solid;
       border-color:#e7ebf2 #10203c #10203c #e7ebf2;border-radius:0 7px 0 0;}
  .pdf .tag{position:absolute;top:42px;left:0;background:#e8453c;color:#fff;font-size:13px;
       font-weight:800;letter-spacing:1px;padding:4px 9px;border-radius:0 4px 4px 0;}
  .pdf .ln{position:absolute;left:11px;height:5px;border-radius:3px;background:#d7dde6;}
  .pdf .ln:nth-child(3){top:14px;width:46px}
  .pdf .ln:nth-child(4){top:24px;width:62px}
  .pdf .ln:nth-child(5){top:74px;width:64px}
  .pdf .ln:nth-child(6){top:84px;width:64px}
  .pdf .ln:nth-child(7){top:94px;width:40px}

  .p-top   {animation:flyTop    9s ease-in-out infinite;}
  .p-right {animation:flyRight  9s ease-in-out infinite;}
  .p-bottom{animation:flyBottom 9s ease-in-out infinite;}
  .p-left  {animation:flyLeft   9s ease-in-out infinite;}

  @keyframes flyTop{
    0%{opacity:0;transform:translate(0,-400px) rotate(-8deg) scale(1)}
    7%{opacity:1}
    22%{opacity:1;transform:translate(0,-40px) rotate(0) scale(.9)}
    30%{opacity:1;transform:translate(0,0) scale(.16)}
    33%,100%{opacity:0;transform:translate(0,0) scale(.05)}
  }
  @keyframes flyBottom{
    0%{opacity:0;transform:translate(0,400px) rotate(8deg) scale(1)}
    7%{opacity:1}
    22%{opacity:1;transform:translate(0,40px) rotate(0) scale(.9)}
    30%{opacity:1;transform:translate(0,0) scale(.16)}
    33%,100%{opacity:0;transform:translate(0,0) scale(.05)}
  }
  @keyframes flyLeft{
    0%{opacity:0;transform:translate(-460px,0) rotate(8deg) scale(1)}
    7%{opacity:1}
    22%{opacity:1;transform:translate(-50px,0) rotate(0) scale(.9)}
    30%{opacity:1;transform:translate(0,0) scale(.16)}
    33%,100%{opacity:0;transform:translate(0,0) scale(.05)}
  }
  @keyframes flyRight{
    0%{opacity:0;transform:translate(460px,0) rotate(-8deg) scale(1)}
    7%{opacity:1}
    22%{opacity:1;transform:translate(50px,0) rotate(0) scale(.9)}
    30%{opacity:1;transform:translate(0,0) scale(.16)}
    33%,100%{opacity:0;transform:translate(0,0) scale(.05)}
  }

  /* ---------------- Monitor ---------------- */
  .monitor{position:absolute;left:50%;top:210px;transform:translate(-50%,-50%);}
  .bezel{width:440px;height:286px;background:#161d33;border-radius:18px;padding:16px;
          box-shadow:0 18px 50px rgba(0,0,0,.55),inset 0 0 0 2px #2b3656;}
  .screen{position:relative;width:100%;height:100%;border-radius:9px;overflow:hidden;
          background:radial-gradient(circle at 50% 40%,#13335c,#0c1d38);}
  .stand{width:120px;height:46px;margin:6px auto 0;
          background:linear-gradient(#26304d,#161d33);border-radius:0 0 10px 10px;
          clip-path:polygon(22% 0,78% 0,100% 100%,0 100%);}
  .base{width:170px;height:14px;margin:0 auto;background:#26304d;border-radius:8px;}

  /* glow pulse while absorbing */
  .screen::after{content:"";position:absolute;inset:0;background:radial-gradient(circle,rgba(44,159,217,.55),transparent 60%);
          opacity:0;animation:absorb 9s ease-in-out infinite;}
  @keyframes absorb{0%,8%{opacity:0}20%{opacity:.9}30%{opacity:.4}32%,100%{opacity:0}}

  /* scan line during processing */
  .scanline{position:absolute;left:6%;right:6%;height:3px;border-radius:3px;
          background:linear-gradient(90deg,transparent,var(--blue),transparent);
          box-shadow:0 0 14px var(--blue);animation:scan 9s linear infinite;}
  @keyframes scan{0%,31%{opacity:0;top:10%}33%{opacity:1}52%{top:86%;opacity:1}55%,100%{opacity:0}}

  /* processing overlay */
  .proc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
        gap:14px;color:#cfe3f5;animation:show1 9s ease-in-out infinite;}
  .proc .gear{width:46px;height:46px;border:5px solid rgba(255,255,255,.18);border-top-color:var(--blue);
        border-radius:50%;animation:spin 1s linear infinite;}
  .proc .t{font-size:16px;letter-spacing:.5px}
  .bar{width:62%;height:9px;background:rgba(255,255,255,.14);border-radius:6px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;border-radius:6px;
        background:linear-gradient(90deg,var(--blue),var(--accent));animation:fill 9s ease-in-out infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fill{0%,32%{width:0}52%{width:100%}55%,100%{width:100%}}
  @keyframes show1{0%,29%{opacity:0}31%,53%{opacity:1}56%,100%{opacity:0}}

  /* results overlay */
  .result{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
        gap:10px;color:#eaf4ff;animation:show2 9s ease-in-out infinite;}
  .check{width:58px;height:58px;border-radius:50%;background:var(--accent);position:relative;
        animation:pop 9s ease-in-out infinite;box-shadow:0 0 22px rgba(39,180,151,.6)}
  .check::after{content:"";position:absolute;left:20px;top:11px;width:13px;height:26px;
        border:solid #fff;border-width:0 5px 5px 0;transform:rotate(45deg)}
  .rtitle{font-size:17px;font-weight:700}
  .chart{display:flex;align-items:flex-end;gap:12px;height:64px;margin-top:4px}
  .chart i{width:18px;border-radius:4px 4px 0 0;height:0;
        background:linear-gradient(var(--blue),var(--accent));animation:grow 9s ease-in-out infinite}
  .chart i:nth-child(1){--h:34px;animation-delay:0s}
  .chart i:nth-child(2){--h:54px}
  .chart i:nth-child(3){--h:42px}
  .chart i:nth-child(4){--h:62px}
  .sub{font-size:12px;color:#9fc1e0;letter-spacing:.3px}
  .tagline{margin-top:8px;font-size:15px;font-weight:600;letter-spacing:.4px;
        background:linear-gradient(90deg,var(--blue),var(--accent));-webkit-background-clip:text;
        background-clip:text;color:transparent;opacity:0;transform:translateY(8px);
        animation:showTag 9s ease-out infinite}
  @keyframes showTag{0%,72%{opacity:0;transform:translateY(8px)}80%,95%{opacity:1;transform:translateY(0)}99%,100%{opacity:0}}
  @keyframes pop{0%,57%{transform:scale(0)}65%{transform:scale(1.15)}70%,96%{transform:scale(1)}99%,100%{transform:scale(0)}}
  @keyframes grow{0%,63%{height:0}80%,96%{height:var(--h)}100%{height:0}}
  @keyframes show2{0%,57%{opacity:0}61%,95%{opacity:1}99%,100%{opacity:0}}

  .caption{position:absolute;bottom:6px;left:0;right:0;text-align:center;color:#9fc1e0;
        font-size:13px;letter-spacing:1px}
</style>
</head>
<body>
  <div class="scene">

    <!-- monitor -->
    <div class="monitor">
      <div class="bezel">
        <div class="screen">
          <div class="scanline"></div>
          <div class="proc">
            <div class="gear"></div>
            <div class="t">Processing documents…</div>
            <div class="bar"><i></i></div>
          </div>
          <div class="result">
            <div class="check"></div>
            <div class="rtitle">Analysis Complete</div>
            <div class="chart"><i></i><i></i><i></i><i></i></div>
            <div class="tagline">Built to save you months of work</div>
          </div>
        </div>
      </div>
      <div class="stand"></div>
      <div class="base"></div>
    </div>

    <!-- four PDFs -->
    <div class="pdf p-top">
      <div class="corner"></div><div class="tag">PDF</div>
      <span class="ln"></span><span class="ln"></span><span class="ln"></span><span class="ln"></span><span class="ln"></span>
    </div>
    <div class="pdf p-right">
      <div class="corner"></div><div class="tag">PDF</div>
      <span class="ln"></span><span class="ln"></span><span class="ln"></span><span class="ln"></span><span class="ln"></span>
    </div>
    <div class="pdf p-bottom">
      <div class="corner"></div><div class="tag">PDF</div>
      <span class="ln"></span><span class="ln"></span><span class="ln"></span><span class="ln"></span><span class="ln"></span>
    </div>
    <div class="pdf p-left">
      <div class="corner"></div><div class="tag">PDF</div>
      <span class="ln"></span><span class="ln"></span><span class="ln"></span><span class="ln"></span><span class="ln"></span>
    </div>

    <div class="caption">SteelTrace · Document Intelligence</div>
  </div>
</body>
</html>
