<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SteelTrace — Deep-Sea Pipeline</title>
<style>
  :root {
    --c-accent: #ffb547;
    --c-accent-2: #ff7e3a;
    --c-text: #eaf4ff;
    --c-muted: #9fb6c9;
    --c-card-bg: rgba(6, 18, 32, 0.82);
    --c-card-border: rgba(180, 220, 255, 0.22);
    --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #02080f; color: var(--c-text); font-family: var(--font); -webkit-font-smoothing: antialiased; }
  body { overflow-x: hidden; }

  .scroll-track { position: relative; }

  #c3d { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; display: block; }

  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    background:
      radial-gradient(ellipse at 50% 35%, transparent 45%, rgba(0,0,0,0.55) 100%),
      radial-gradient(ellipse at center, transparent 60%, rgba(2,8,15,0.5) 100%);
  }
  .tint {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background: linear-gradient(180deg, rgba(20,60,100,0.06), transparent 30%, rgba(0,15,30,0.1));
    mix-blend-mode: overlay;
  }
  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 3;
    opacity: 0.05; mix-blend-mode: overlay;
    background-image:
      repeating-radial-gradient(circle at 17% 23%, rgba(255,255,255,1) 0px, rgba(255,255,255,1) 1px, transparent 1px, transparent 3px),
      repeating-radial-gradient(circle at 73% 67%, rgba(255,255,255,1) 0px, rgba(255,255,255,1) 1px, transparent 1px, transparent 3px);
    background-size: 4px 4px, 5px 5px;
  }

  .hud {
    position: fixed; top: 18px; left: 18px;
    z-index: 10;
    color: var(--c-text); font-size: 12px;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .hud .brand { font-size: 18px; font-weight: 800; letter-spacing: 0.22em; margin-bottom: 4px; }
  .hud .brand span { color: var(--c-accent); }
  .hud .meta { color: var(--c-muted); font-size: 11px; }
  .hud .meta b { color: var(--c-text); font-weight: 600; }

  .progress {
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.06); z-index: 11;
  }
  .progress > div {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--c-accent), var(--c-accent-2));
    transition: width 0.05s linear;
  }

  .card-stack {
    position: fixed; right: 4vw; top: 50%;
    transform: translateY(-50%);
    width: min(440px, 42vw);
    z-index: 8; pointer-events: none;
  }
  .info-card {
    position: absolute; top: 0; left: 0; right: 0;
    background: var(--c-card-bg);
    border: 1px solid var(--c-card-border);
    border-radius: 14px; padding: 22px 22px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    opacity: 0;
    transform: translateY(40px) scale(0.97);
    transition: opacity 0.55s ease, transform 0.55s cubic-bezier(.2,.7,.2,1);
    pointer-events: auto;
  }
  .info-card.active { opacity: 1; transform: translateY(0) scale(1); }
  .info-card .code {
    display: inline-block;
    font-size: 11px; font-weight: 800; letter-spacing: 0.2em;
    color: #0a131e; background: var(--c-accent);
    padding: 4px 9px; border-radius: 4px; margin-bottom: 10px;
  }
  .info-card h2 { font-size: 24px; line-height: 1.15; margin-bottom: 8px; letter-spacing: 0.01em; }
  .info-card .lede { color: var(--c-muted); font-size: 13px; line-height: 1.5; margin-bottom: 12px; }
  .info-card .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .info-card .grid > div {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px; padding: 9px 10px;
    font-size: 11.5px; line-height: 1.45;
  }
  .info-card .grid > div b {
    display: block; font-size: 10px; letter-spacing: 0.15em;
    color: var(--c-accent); margin-bottom: 3px; text-transform: uppercase; font-weight: 800;
  }
  .info-card.hero h2 { font-size: 34px; line-height: 1.05; }
  .info-card.hero .lede { font-size: 15px; }
  .info-card.section-header h2 {
    font-size: 28px; color: var(--c-accent);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .info-card.stats .big-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
  .info-card.stats .big-grid > div {
    background: linear-gradient(180deg, rgba(255,181,71,0.16), rgba(255,181,71,0.02));
    border: 1px solid rgba(255,181,71,0.28);
    border-radius: 10px; padding: 16px; text-align: center;
  }
  .info-card.stats .big-grid b {
    display: block; font-size: 36px; font-weight: 800;
    color: var(--c-accent); line-height: 1; margin-bottom: 4px;
  }
  .info-card.stats .big-grid span { font-size: 11px; color: var(--c-muted); letter-spacing: 0.05em; }
  .info-card.final {
    background: linear-gradient(180deg, rgba(255,181,71,0.16), rgba(8,22,38,0.85));
    border-color: rgba(255,181,71,0.4);
  }

  .nav-rail {
    position: fixed; right: 18px; top: 50%;
    transform: translateY(-50%); z-index: 12;
    display: flex; flex-direction: column; gap: 8px;
  }
  .nav-rail button {
    appearance: none; border: 1px solid rgba(255,255,255,0.45);
    width: 9px; height: 9px; border-radius: 50%;
    background: transparent; padding: 0; cursor: pointer;
    transition: all 0.2s ease;
  }
  .nav-rail button:hover { background: rgba(255,255,255,0.4); }
  .nav-rail button.active {
    background: var(--c-accent); border-color: var(--c-accent);
    transform: scale(1.35);
  }

  .hint {
    position: fixed; bottom: 22px; left: 50%;
    transform: translateX(-50%);
    color: var(--c-muted); font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase;
    z-index: 50; opacity: 0.85; pointer-events: none;
    animation: bob 2s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(6px); }
  }
  .hint.hidden { opacity: 0; }

  .loader {
    position: fixed; inset: 0; z-index: 100;
    background: #02080f;
    display: flex; align-items: center; justify-content: center;
    color: var(--c-text); font-size: 11px; letter-spacing: 0.3em;
    transition: opacity 0.8s ease;
  }
  .loader.gone { opacity: 0; pointer-events: none; }
  .loader .pulse {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: var(--c-accent);
    margin-right: 10px;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  @media (max-width: 700px) {
    .card-stack { width: 90vw; right: 5vw; left: 5vw; }
    .info-card h2 { font-size: 20px; }
    .info-card.hero h2 { font-size: 26px; }
    .info-card .grid { grid-template-columns: 1fr; }
    .nav-rail { display: none; }
  }
</style>
</head>

  const N = stations.length;
  const STATION_SPACING = 80;
  const PIPE_PADDING = 70;
  const PIPE_LENGTH = STATION_SPACING * (N - 1) + PIPE_PADDING * 2;

  // ---------- UI ----------
  const cardStack = document.getElementById("cardStack");
  const navRail = document.getElementById("navRail");
  stations.forEach((s, i) => {
    const card = document.createElement("div");
    card.className = "info-card " + (s.type || "default");
    let infoHtml = "";
    if (s.type === "stats" && s.info.length) {
      infoHtml = `<div class="big-grid">` +
        s.info.map(it => `<div><b>${it.big}</b><span>${it.label}</span></div>`).join("") + `</div>`;
    } else if (s.info && s.info.length) {
      infoHtml = `<div class="grid">` +
        s.info.map(it => `<div><b>${it.label}</b>${it.text}</div>`).join("") + `</div>`;
    }
    card.innerHTML = `
      ${s.code ? `<div class="code">${s.code}</div>` : ""}
      <h2>${s.title}</h2>
      ${s.lede ? `<div class="lede">${s.lede}</div>` : ""}
      ${infoHtml}
    `;
    cardStack.appendChild(card);

    const b = document.createElement("button");
    b.title = s.title;
    b.dataset.idx = i;
    b.addEventListener("click", () => {
      const total = document.getElementById("track").offsetHeight - window.innerHeight;
      // stationT is defined later — recompute the target the same way the curve does
      const FS = 0.12, LS = 0.88;
      const tt = FS + (i / (N - 1)) * (LS - FS);
      window.scrollTo({ top: tt * total, behavior: "smooth" });
    });
    navRail.appendChild(b);
  });
  const cards = cardStack.querySelectorAll(".info-card");
  const navBtns = navRail.querySelectorAll("button");

  // ---------- procedural textures ----------
  // === CWC (concrete-weight-coated) subsea pipe texture ===
  // Long concrete sections interrupted by exposed-steel field-joint bands every 1/3 of the repeat.
  function makeSteelTexture(w, h) {
    const c = document.createElement("canvas"); c.width = w; c.height = h;
    const x = c.getContext("2d");
    // concrete base
    x.fillStyle = "#8c8175"; x.fillRect(0, 0, w, h);
    // aggregate speckle (real CWC has visible aggregate)
    for (let i = 0; i < 14000; i++) {
      const v = Math.random() * 60 - 30;
      const r = 135 + v, g = 124 + v, b = 110 + v;
      x.fillStyle = `rgba(${r},${g},${b},${0.45 + Math.random() * 0.4})`;
      const sz = 0.6 + Math.random() * 1.6;
      x.fillRect(Math.random() * w, Math.random() * h, sz, sz);
    }
    // larger aggregate pebbles
    for (let i = 0; i < 1400; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const rr = 1.6 + Math.random() * 3.5;
      const rg = x.createRadialGradient(cx, cy, 0, cx, cy, rr);
      const tone = 80 + Math.random() * 70;
      rg.addColorStop(0, `rgba(${tone},${tone - 6},${tone - 16},0.7)`);
      rg.addColorStop(1, `rgba(${tone},${tone - 6},${tone - 16},0)`);
      x.fillStyle = rg;
      x.fillRect(cx - rr, cy - rr, rr * 2, rr * 2);
    }
    // dark drip streaks (water staining)
    for (let i = 0; i < 90; i++) {
      const cx = Math.random() * w, cy = Math.random() * h * 0.4;
      const ch = 40 + Math.random() * 140;
      const grad = x.createLinearGradient(cx, cy, cx, cy + ch);
      grad.addColorStop(0, "rgba(28, 32, 28, 0.6)");
      grad.addColorStop(1, "rgba(28, 32, 28, 0)");
      x.fillStyle = grad;
      x.fillRect(cx - (1 + Math.random()*2), cy, 2 + Math.random()*3, ch);
    }
    // algae / biofilm patches (greenish brown)
    for (let i = 0; i < 70; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const r = 14 + Math.random() * 60;
      const rg = x.createRadialGradient(cx, cy, 0, cx, cy, r);
      const aR = 40 + Math.random() * 25;
      const aG = 60 + Math.random() * 30;
      const aB = 26 + Math.random() * 18;
      rg.addColorStop(0, `rgba(${aR},${aG},${aB},${0.55 + Math.random() * 0.3})`);
      rg.addColorStop(0.5, `rgba(${aR},${aG},${aB},0.25)`);
      rg.addColorStop(1, `rgba(${aR},${aG},${aB},0)`);
      x.fillStyle = rg;
      x.fillRect(cx - r, cy - r, r * 2, r * 2);
    }
    // soft hotspots and shadow on concrete (large-scale lighting variation)
    for (let i = 0; i < 30; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const r = 60 + Math.random() * 160;
      const rg = x.createRadialGradient(cx, cy, 0, cx, cy, r);
      const lite = Math.random() < 0.5;
      rg.addColorStop(0, lite ? "rgba(180,170,150,0.18)" : "rgba(40,38,32,0.25)");
      rg.addColorStop(1, "rgba(0,0,0,0)");
      x.fillStyle = rg;
      x.fillRect(cx - r, cy - r, r * 2, r * 2);
    }

    // Field joints: exposed-steel sections at 1/3 width intervals
    const bandSpacing = w / 3;
    const fw = w / 22; // narrow exposed-steel band
    for (let i = 1; i < 3; i++) {
      const bx = i * bandSpacing;

      // recessed edge shadow (concrete chamfer into steel)
      const gradL = x.createLinearGradient(bx - fw, 0, bx - fw / 2, 0);
      gradL.addColorStop(0, "rgba(20,20,20,0)");
      gradL.addColorStop(1, "rgba(15,15,15,0.7)");
      x.fillStyle = gradL;
      x.fillRect(bx - fw, 0, fw / 2, h);

      // exposed steel (dark, vertical gradient)
      const steelGrad = x.createLinearGradient(0, 0, 0, h);
      steelGrad.addColorStop(0,   "#5e6770");
      steelGrad.addColorStop(0.5, "#373d46");
      steelGrad.addColorStop(1,   "#1c2026");
      x.fillStyle = steelGrad;
      x.fillRect(bx - fw / 2, 0, fw, h);

      // brushed metal noise on steel band
      for (let s = 0; s < 240; s++) {
        x.fillStyle = `rgba(200,210,220,${0.05 + Math.random() * 0.15})`;
        x.fillRect(bx - fw / 2 + Math.random() * fw, Math.random() * h, 1, 0.5);
      }
      // rust on steel band
      for (let r = 0; r < 18; r++) {
        const rx = bx - fw / 2 + Math.random() * fw;
        const ry = Math.random() * h;
        const rr = 3 + Math.random() * 7;
        const rg = x.createRadialGradient(rx, ry, 0, rx, ry, rr);
        rg.addColorStop(0, `rgba(150,72,28,${0.6 + Math.random() * 0.3})`);
        rg.addColorStop(1, "rgba(150,72,28,0)");
        x.fillStyle = rg;
        x.fillRect(rx - rr, ry - rr, rr * 2, rr * 2);
      }
      // weld bead (bright raised line down the centre)
      const weldGrad = x.createLinearGradient(bx - 3, 0, bx + 3, 0);
      weldGrad.addColorStop(0,   "rgba(0,0,0,0.55)");
      weldGrad.addColorStop(0.5, "rgba(196,200,206,0.85)");
      weldGrad.addColorStop(1,   "rgba(0,0,0,0.55)");
      x.fillStyle = weldGrad;
      x.fillRect(bx - 3, 0, 6, h);
      // weld stitching texture
      for (let s = 0; s < h; s += 2.5) {
        x.fillStyle = `rgba(220,225,232,${0.12 + Math.random() * 0.15})`;
        x.fillRect(bx - 2 + (Math.random() - 0.5) * 1.2, s, 4, 1.2);
      }

      // recessed edge shadow on the other side
      const gradR = x.createLinearGradient(bx + fw / 2, 0, bx + fw, 0);
      gradR.addColorStop(0, "rgba(15,15,15,0.7)");
      gradR.addColorStop(1, "rgba(20,20,20,0)");
      x.fillStyle = gradR;
      x.fillRect(bx + fw / 2, 0, fw / 2, h);
    }

    const t = new THREE.CanvasTexture(c);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.anisotropy = 16;
    t.encoding = THREE.sRGBEncoding;
    return t;
  }

  // === Roughness map: rough concrete everywhere, polished steel at field joints ===
  function makeSteelRoughness(w, h) {

        rg.addColorStop(1, "rgba(210,210,210,0)");

        x.fillRect(rx - rr, ry - rr, rr * 2, rr * 2);
      }
    }
    const t = new THREE.CanvasTexture(c);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    return t;
  }

  // === Metalness map: 0 on concrete, 1 on field-joint steel ===
  function makeSteelMetalness(w, h) {
    const c = document.createElement("canvas"); c.width = w; c.height = h;
    const x = c.getContext("2d");
    x.fillStyle = "#0a0a0a"; x.fillRect(0, 0, w, h); // concrete is non-metallic

  }

  // === Photo-grade deep-sea sediment color map ===
  // Layered: warm sandy base → grain speckle → pebbles → ripple bands →
  // sediment patches → iron staining → worm casts → drag marks → burrow holes
  function makeSandTexture(w, h) {
    const c = document.createElement("canvas"); c.width = w; c.height = h;
    const x = c.getContext("2d");

    // 1. base — warm gray-tan sediment (matches real ROV stills from ~150m+)
    const base = x.createLinearGradient(0, 0, w, h);
    base.addColorStop(0,    "#3e3a32");
    base.addColorStop(0.4,  "#454038");
    base.addColorStop(0.7,  "#3a352e");
    base.addColorStop(1,    "#403a32");
    x.fillStyle = base; x.fillRect(0, 0, w, h);

    // 2. fine grain speckle (LOTS — sand is granular at every pixel)
    for (let i = 0; i < 22000; i++) {
      const v = Math.random() * 40 - 10;
      const r = 100 + v, g = 92 + v, b = 80 + v;
      const s = 0.5 + Math.random() * 1.3;
      x.fillStyle = `rgba(${r},${g},${b},${0.35 + Math.random() * 0.45})`;
      x.fillRect(Math.random() * w, Math.random() * h, s, s);
    }

    // 3. occasional bright grains (calcite/quartz catching highlights)
    for (let i = 0; i < 2200; i++) {
      const v = 180 + Math.random() * 50;
      x.fillStyle = `rgba(${v},${v - 5},${v - 18},${0.45 + Math.random() * 0.35})`;
      x.fillRect(Math.random() * w, Math.random() * h, 0.8, 0.8);
    }

    // 4. small pebbles & grains
    for (let i = 0; i < 1900; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const rr = 1.0 + Math.random() * 3.0;
      const rg = x.createRadialGradient(cx, cy, 0, cx, cy, rr);
      const tone = 60 + Math.random() * 80;
      rg.addColorStop(0, `rgba(${tone},${tone - 6},${tone - 18},0.75)`);
      rg.addColorStop(0.7, `rgba(${tone - 10},${tone - 14},${tone - 24},0.4)`);
      rg.addColorStop(1, "rgba(0,0,0,0)");
      x.fillStyle = rg;
      x.fillRect(cx - rr, cy - rr, rr * 2, rr * 2);
    }

    // 5. broad ripple bands (large dunes, low amplitude)
    for (let i = 0; i < 60; i++) {
      const yy = (i / 60) * h;
      x.strokeStyle = `rgba(${22 + Math.random() * 18},${20 + Math.random() * 18},${16 + Math.random() * 18},${0.18 + Math.random() * 0.18})`;
      x.lineWidth = 2 + Math.random() * 3;
      x.beginPath();
      for (let xx = 0; xx <= w; xx += 4) {
        const off = Math.sin(xx * 0.012 + i * 0.6) * 12 + Math.sin(xx * 0.07 + i * 1.4) * 3;
        if (xx === 0) x.moveTo(xx, yy + off);
        else x.lineTo(xx, yy + off);
      }
      x.stroke();
    }

    // 6. tight ripple bands (small surface ripples, high frequency)
    for (let i = 0; i < 220; i++) {
      const yy = (i / 220) * h;
      x.strokeStyle = `rgba(${26 + Math.random() * 22},${24 + Math.random() * 22},${20 + Math.random() * 22},${0.12 + Math.random() * 0.15})`;
      x.lineWidth = 0.8 + Math.random() * 1.2;
      x.beginPath();
      for (let xx = 0; xx <= w; xx += 3) {
        const off = Math.sin(xx * 0.06 + i * 0.9) * 4 + Math.sin(xx * 0.18 + i * 2.1) * 1.5;
        if (xx === 0) x.moveTo(xx, yy + off);
        else x.lineTo(xx, yy + off);
      }
      x.stroke();
    }

    // 7. darker organic sediment patches (decaying matter, mud lenses)
    for (let i = 0; i < 36; i++) {
      const rx = Math.random() * w, ry = Math.random() * h, rr = 70 + Math.random() * 260;
      const rg = x.createRadialGradient(rx, ry, 0, rx, ry, rr);
      rg.addColorStop(0, `rgba(14,12,10,${0.4 + Math.random() * 0.3})`);
      rg.addColorStop(1, "rgba(14,12,10,0)");
      x.fillStyle = rg;
      x.fillRect(rx - rr, ry - rr, rr * 2, rr * 2);
    }

    // 8. lighter sand patches (carbonate-rich)
    for (let i = 0; i < 22; i++) {
      const rx = Math.random() * w, ry = Math.random() * h, rr = 80 + Math.random() * 200;
      const rg = x.createRadialGradient(rx, ry, 0, rx, ry, rr);
      rg.addColorStop(0, `rgba(150, 140, 120, ${0.18 + Math.random() * 0.18})`);
      rg.addColorStop(1, "rgba(150, 140, 120, 0)");
      x.fillStyle = rg;
      x.fillRect(rx - rr, ry - rr, rr * 2, rr * 2);
    }

    // 9. iron-stained reddish patches
    for (let i = 0; i < 18; i++) {
      const rx = Math.random() * w, ry = Math.random() * h, rr = 50 + Math.random() * 170;
      const rg = x.createRadialGradient(rx, ry, 0, rx, ry, rr);
      rg.addColorStop(0, `rgba(120, 70, 38, ${0.25 + Math.random() * 0.22})`);
      rg.addColorStop(1, "rgba(120, 70, 38, 0)");
      x.fillStyle = rg;
      x.fillRect(rx - rr, ry - rr, rr * 2, rr * 2);
    }

    // 10. worm casts — small light mounds with darker hole in centre (real seabed has many)
    for (let i = 0; i < 240; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const rr = 2 + Math.random() * 4;
      // light ring
      const rg = x.createRadialGradient(cx, cy, 0, cx, cy, rr);
      rg.addColorStop(0, "rgba(160, 148, 122, 0.5)");
      rg.addColorStop(0.6, "rgba(140, 128, 102, 0.35)");
      rg.addColorStop(1, "rgba(0,0,0,0)");
      x.fillStyle = rg;
      x.fillRect(cx - rr, cy - rr, rr * 2, rr * 2);
      // dark centre hole
      const hr = rr * 0.35;
      const hg = x.createRadialGradient(cx, cy, 0, cx, cy, hr);
      hg.addColorStop(0, "rgba(8, 7, 6, 0.85)");
      hg.addColorStop(1, "rgba(8, 7, 6, 0)");
      x.fillStyle = hg;
      x.fillRect(cx - hr, cy - hr, hr * 2, hr * 2);
    }

    // 11. burrow / animal holes (larger, darker)
    for (let i = 0; i < 80; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const rr = 4 + Math.random() * 7;
      // raised rim
      const ring = x.createRadialGradient(cx, cy, rr * 0.5, cx, cy, rr);
      ring.addColorStop(0, "rgba(0,0,0,0)");
      ring.addColorStop(0.6, "rgba(160, 145, 118, 0.4)");
      ring.addColorStop(1, "rgba(160, 145, 118, 0)");
      x.fillStyle = ring;
      x.fillRect(cx - rr, cy - rr, rr * 2, rr * 2);
      // pitch-black centre
      const hole = x.createRadialGradient(cx, cy, 0, cx, cy, rr * 0.55);
      hole.addColorStop(0, "rgba(2, 2, 2, 1)");
      hole.addColorStop(0.7, "rgba(2, 2, 2, 0.8)");
      hole.addColorStop(1, "rgba(2, 2, 2, 0)");
      x.fillStyle = hole;
      x.fillRect(cx - rr, cy - rr, rr * 2, rr * 2);
    }

    // 12. drag / crawl marks (thin curved lines)
    for (let i = 0; i < 30; i++) {
      x.strokeStyle = `rgba(${18 + Math.random() * 15},${16 + Math.random() * 15},${14 + Math.random() * 15},${0.35 + Math.random() * 0.25})`;
      x.lineWidth = 0.7 + Math.random() * 1.2;
      x.beginPath();
      const sx = Math.random() * w, sy = Math.random() * h;
      x.moveTo(sx, sy);
      const len = 30 + Math.random() * 90;
      const ang = Math.random() * Math.PI * 2;
      for (let k = 1; k < 20; k++) {
        const a = ang + Math.sin(k * 0.7) * 0.4;
        x.lineTo(sx + Math.cos(a) * (len * k / 20), sy + Math.sin(a) * (len * k / 20));
      }
      x.stroke();
    }

    const t = new THREE.CanvasTexture(c);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.anisotropy = 16;
    t.encoding = THREE.sRGBEncoding;
    return t;
  }

  function makeNoiseAlpha(w, h) {
    const c = document.createElement("canvas"); c.width = w; c.height = h;
    const x = c.getContext("2d");
    for (let yy = 0; yy < h; yy++) {

  // === normal map for CWC pipe: concrete aggregate bumps + recessed field joints ===
  function makeSteelNormal(w, h) {
    const c = document.createElement("canvas"); c.width = w; c.height = h;
    const x = c.getContext("2d");
    x.fillStyle = "#8080ff"; x.fillRect(0, 0, w, h); // neutral

    for (let i = 0; i < 4500; i++) {
      const cx = Math.random() * w;

      const rr = 1.4 + Math.random() * 3.5;
      const g = x.createRadialGradient(cx, cy, 0, cx, cy, rr);
      g.addColorStop(0, "rgba(155, 155, 230, 0.8)");
      g.addColorStop(0.5, "rgba(140, 140, 240, 0.4)");
      g.addColorStop(1, "rgba(128, 128, 255, 0)");

      x.fillRect(cx - rr, cy - rr, rr * 2, rr * 2);
    }
    // small pits
    for (let i = 0; i < 1200; i++) {
      const cx = Math.random() * w;
      const cy = Math.random() * h;
      const rr = 0.8 + Math.random() * 1.8;
      const g = x.createRadialGradient(cx, cy, 0, cx, cy, rr);
      g.addColorStop(0, "rgba(96, 96, 230, 0.7)");

      x.fillRect(cx - rr, cy - rr, rr * 2, rr * 2);
    }
    // field joints: recessed (concrete steps down) — neutral with subtle raised weld bead
    const bandSpacing = w / 3;
    const fw = w / 22;
    for (let i = 1; i < 3; i++) {
      const bx = i * bandSpacing;
      // recessed edge: concrete dropping down to steel
      const gradL = x.createLinearGradient(bx - fw, 0, bx - fw / 2, 0);
      gradL.addColorStop(0, "rgba(96, 128, 255, 0)");
      gradL.addColorStop(1, "rgba(96, 128, 255, 0.85)");
      x.fillStyle = gradL;
      x.fillRect(bx - fw, 0, fw / 2, h);

      // flat steel surface in joint (lower than concrete)
      x.fillStyle = "#8080ff";
      x.fillRect(bx - fw / 2, 0, fw, h);
      // tiny rust pits on steel
      for (let r = 0; r < 50; r++) {
        const rx = bx - fw / 2 + Math.random() * fw;

        const rr = 0.6 + Math.random() * 1.6;
        const g = x.createRadialGradient(rx, ry, 0, rx, ry, rr);
        g.addColorStop(0, "rgba(96, 96, 230, 0.7)");
        g.addColorStop(1, "rgba(128, 128, 255, 0)");
        x.fillStyle = g;
        x.fillRect(rx - rr, ry - rr, rr * 2, rr * 2);
      }
      // raised weld bead (centre)
      const wgL = x.createLinearGradient(bx - 3, 0, bx, 0);
      wgL.addColorStop(0, "rgba(160, 128, 255, 0.85)");
      wgL.addColorStop(1, "rgba(160, 128, 255, 0)");
      x.fillStyle = wgL;
      x.fillRect(bx - 3, 0, 3, h);
      const wgR = x.createLinearGradient(bx, 0, bx + 3, 0);
      wgR.addColorStop(0, "rgba(96, 128, 255, 0)");
      wgR.addColorStop(1, "rgba(96, 128, 255, 0.85)");

      x.fillRect(bx + fw / 2, 0, fw / 2, h);
    }
    const t = new THREE.CanvasTexture(c);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.anisotropy = 16;
    return t;
  }

  // === Photo-grade sand normal map: multi-scale ripples + grains + worm casts + burrow rims ===

      const cy = Math.random() * h;
      const rr = 0.6 + Math.random() * 1.6;
      const g = x.createRadialGradient(cx, cy, 0, cx, cy, rr);
      g.addColorStop(0, "rgba(150, 150, 250, 0.7)");
      g.addColorStop(1, "rgba(128, 128, 255, 0)");
      x.fillStyle = g;
      x.fillRect(cx - rr, cy - rr, rr * 2, rr * 2);
    }
    // worm cast mounds (raised rings + recessed centre)
    for (let i = 0; i < 240; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const rr = 2 + Math.random() * 4;
      // raised ring (radial gradient outward)
      const rg = x.createRadialGradient(cx, cy, rr * 0.5, cx, cy, rr);
      rg.addColorStop(0, "rgba(128, 128, 255, 0)");
      rg.addColorStop(0.5, "rgba(160, 140, 255, 0.7)");
      rg.addColorStop(1, "rgba(96, 112, 255, 0)");
      x.fillStyle = rg;
      x.fillRect(cx - rr, cy - rr, rr * 2, rr * 2);
      // recessed centre (dent)
      const hr = rr * 0.4;
      const hg = x.createRadialGradient(cx, cy, 0, cx, cy, hr);
      hg.addColorStop(0, "rgba(90, 90, 220, 0.85)");
      hg.addColorStop(1, "rgba(128, 128, 255, 0)");
      x.fillStyle = hg;
      x.fillRect(cx - hr, cy - hr, hr * 2, hr * 2);
    }
    // burrow rims (larger, deeper)
    for (let i = 0; i < 80; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const rr = 4 + Math.random() * 8;
      // raised rim
      const ring = x.createRadialGradient(cx, cy, rr * 0.5, cx, cy, rr);
      ring.addColorStop(0, "rgba(128, 128, 255, 0)");
      ring.addColorStop(0.6, "rgba(170, 140, 255, 0.7)");
      ring.addColorStop(1, "rgba(128, 128, 255, 0)");
      x.fillStyle = ring;
      x.fillRect(cx - rr, cy - rr, rr * 2, rr * 2);
      // recessed pit
      const pit = x.createRadialGradient(cx, cy, 0, cx, cy, rr * 0.5);
      pit.addColorStop(0, "rgba(70, 70, 210, 0.9)");
      pit.addColorStop(1, "rgba(128, 128, 255, 0)");
      x.fillStyle = pit;
      x.fillRect(cx - rr, cy - rr, rr * 2, rr * 2);
    }

    const t = new THREE.CanvasTexture(c);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.anisotropy = 16;
    return t;
  }

  // ---- equirectangular environment map for PBR reflections (underwater gradient) ----
  function makeEnvmapTexture() {
    const c = document.createElement("canvas");
    c.width = 1024; c.height = 512;
    const x = c.getContext("2d");
    // vertical depth gradient (top = surface light, bottom = deep)
    const g = x.createLinearGradient(0, 0, 0, c.height);
    g.addColorStop(0.00, "#7ab9dc");
    g.addColorStop(0.15, "#3d7fa5");
    g.addColorStop(0.35, "#1e4868");
    g.addColorStop(0.55, "#0e2a44");
    g.addColorStop(0.80, "#06131f");
    g.addColorStop(1.00, "#020812");
    x.fillStyle = g; x.fillRect(0, 0, c.width, c.height);
    // faint caustic shimmer near top
    for (let i = 0; i < 22; i++) {
      const cx = Math.random() * c.width;
      const cy = Math.random() * 150;
      const rr = 30 + Math.random() * 80;
      const rg = x.createRadialGradient(cx, cy, 0, cx, cy, rr);
      rg.addColorStop(0, "rgba(180, 220, 250, 0.35)");
      rg.addColorStop(1, "rgba(180, 220, 250, 0)");
      x.fillStyle = rg;
      x.fillRect(cx - rr, cy - rr, rr * 2, rr * 2);
    }
    const t = new THREE.CanvasTexture(c);
    t.mapping = THREE.EquirectangularReflectionMapping;
    t.encoding = THREE.sRGBEncoding;
    return t;
  }

  // ---------- SPEC PLAQUE CANVAS ----------
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y,     x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x,     y + h, r);
    ctx.arcTo(x,     y + h, x,     y,     r);
    ctx.arcTo(x,     y,     x + w, y,     r);
    ctx.closePath();
  }

  function makeSpecSprite(station) {
    const w = 640, h = 320;
    const c = document.createElement("canvas"); c.width = w; c.height = h;
    const x = c.getContext("2d");
    // bg
    x.fillStyle = "rgba(6, 18, 32, 0.92)";
    roundRect(x, 8, 8, w - 16, h - 16, 16);
    x.fill();
    // border
    x.strokeStyle = "rgba(255, 181, 71, 0.75)";
    x.lineWidth = 2;
    roundRect(x, 8, 8, w - 16, h - 16, 16);
    x.stroke();
    // inner subtle border
    x.strokeStyle = "rgba(255,255,255,0.05)";
    x.lineWidth = 1;
    roundRect(x, 16, 16, w - 32, h - 32, 12);
    x.stroke();
    // corner brackets
    x.strokeStyle = "#ffb547"; x.lineWidth = 3;
    const cb = 24;
    x.beginPath(); x.moveTo(cb, 32); x.lineTo(cb, cb); x.lineTo(48, cb); x.stroke();
    x.beginPath(); x.moveTo(w - 48, cb); x.lineTo(w - cb, cb); x.lineTo(w - cb, 48); x.stroke();
    x.beginPath(); x.moveTo(cb, h - 48); x.lineTo(cb, h - cb); x.lineTo(48, h - cb); x.stroke();
    x.beginPath(); x.moveTo(w - 48, h - cb); x.lineTo(w - cb, h - cb); x.lineTo(w - cb, h - 48); x.stroke();
    // code chip
    if (station.code) {
      x.fillStyle = "#ffb547";
      const codeW = Math.max(72, 14 + x.measureText(station.code).width + 18);
      roundRect(x, 36, 36, codeW, 34, 6);
      x.fill();
      x.fillStyle = "#0a131e";
      x.font = "700 16px Inter, system-ui, sans-serif";
      x.textBaseline = "middle";
      x.textAlign = "center";
      x.fillText(station.code, 36 + codeW / 2, 53);
      x.textAlign = "start";
    }
    // title
    x.fillStyle = "#eaf4ff";
    x.font = "700 22px Inter, system-ui, sans-serif";
    x.textBaseline = "middle";
    const titleX = station.code ? 36 + 84 : 44;
    // truncate title if too long
    let title = station.title;
    while (x.measureText(title).width > w - titleX - 30 && title.length > 0) {
      title = title.slice(0, -1);
    }
    if (title !== station.title) title = title.slice(0, -1) + "…";
    x.fillText(title, titleX, 53);

    // small label
    x.fillStyle = "#9fb6c9";
    x.font = "600 11px Inter, system-ui, sans-serif";
    x.textBaseline = "alphabetic";
    x.fillText("// PIPELINE TELEMETRY", 36, 96);

    // accent rule
    x.strokeStyle = "rgba(255,181,71,0.4)";
    x.lineWidth = 1;
    x.beginPath(); x.moveTo(36, 108); x.lineTo(w - 36, 108); x.stroke();

    // spec rows
    const rows = station.specs || [];
    rows.forEach((row, i) => {
      const yy = 142 + i * 36;
      x.fillStyle = "#7a8da0";
      x.font = "600 13px Inter, system-ui, sans-serif";
      x.textBaseline = "middle";
      x.fillText(row.k, 40, yy);

      x.fillStyle = "#eaf4ff";
      x.font = "700 15px Inter, system-ui, sans-serif";
      x.textAlign = "right";
      x.fillText(row.v, w - 40, yy);
      x.textAlign = "left";

      // tiny accent square
      x.fillStyle = "#ffb547";
      x.fillRect(28, yy - 3, 6, 6);
    });

    const tex = new THREE.CanvasTexture(c);
    tex.encoding = THREE.sRGBEncoding;
    tex.anisotropy = 16;
    const mat = new THREE.SpriteMaterial({
      map: tex, transparent: true,
      depthTest: true, depthWrite: false
    });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(14, 7, 1);
    return sprite;
  }

  // ---------- THREE.JS SCENE ----------
  const canvas = document.getElementById("c3d");
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x05131a, 1);
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.12;
  renderer.physicallyCorrectLights = true;

  const scene = new THREE.Scene();
  // Murky deep-sea fog (greenish-teal — what real ROV footage at depth looks like)
  scene.fog = new THREE.FogExp2(0x0d2128, 0.026);

  const camera = new THREE.PerspectiveCamera(56, window.innerWidth / window.innerHeight, 0.1, 1500);

  // ----- Environment map (PBR reflections for metallic surfaces) -----
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  const envSource = makeEnvmapTexture();
  const envMap = pmrem.fromEquirectangular(envSource).texture;
  scene.environment = envMap;
  envSource.dispose();
  pmrem.dispose();

  // ----- Lighting (artificial-light-dominated, like real ROV inspection footage) -----
  // Faint ambient: very little sunlight reaches 156–3000m
  const hemi = new THREE.HemisphereLight(0x355c6a, 0x040810, 0.35);
  scene.add(hemi);

  // Distant soft top-down "ambient cast" (NOT direct sun — that's gone at depth)
  const sun = new THREE.DirectionalLight(0x6a9cb5, 0.45);
  sun.position.set(20, 90, 20);
  scene.add(sun);

  // Soft cool rim from one side
  const rim = new THREE.DirectionalLight(0x16384a, 0.35);
  rim.position.set(-40, 30, -60);
  scene.add(rim);

  // ROV-mounted forward spotlight — the actual key light underwater
  const rovSpot = new THREE.SpotLight(0xfff2d8, 90, 80, Math.PI / 5.5, 0.35, 1.6);
  const rovTarget = new THREE.Object3D();
  scene.add(rovSpot);
  scene.add(rovTarget);
  rovSpot.target = rovTarget;

  // Soft camera fill so silhouettes don't go pitch black
  const camFill = new THREE.PointLight(0x8fb2c8, 18, 35, 2);
  scene.add(camFill);

  // Secondary slightly warm wash forward to lift mid-tones
  const camWash = new THREE.PointLight(0xfff0d8, 6, 50, 2);
  scene.add(camWash);

  // ----- Pipeline curve: descent → swerving horizontal → burrow into seabed -----
  const pipeRadius = 2.1;
  const DESCENT_END = 0.08;
  const BURROW_START = 0.92;

  function horizontalX(u) {
    // u in [0,1] across the horizontal phase
    return Math.sin(u * Math.PI * 4.2) * 50
         + Math.sin(u * Math.PI * 1.3) * 24
         + Math.sin(u * Math.PI * 9.0) * 5;
  }
  function horizontalY(u) {
    return -2.6 + Math.sin(u * Math.PI * 3.5) * 0.9 + Math.cos(u * Math.PI * 1.8) * 0.6;
  }

  const pathPoints = [];
  const SEG = 90;
  for (let i = 0; i <= SEG; i++) {
    const t = i / SEG;
    let x, y, z;
    if (t <= DESCENT_END) {
      // descent: from above water down to the seabed
      const u = t / DESCENT_END;
      const eased = u * u * (3 - 2 * u); // smoothstep
      y = 28 - 30.6 * eased;       // 28 → -2.6
      z = u * 12;                   // small forward motion
      x = Math.sin(u * Math.PI) * 3;
    } else if (t < BURROW_START) {
      const u = (t - DESCENT_END) / (BURROW_START - DESCENT_END);
      x = horizontalX(u);
      y = horizontalY(u);
      z = 12 + u * (PIPE_LENGTH - 24);
    } else {
      // burrow: dive into the seabed
      const u = (t - BURROW_START) / (1 - BURROW_START);
      const eased = u * u;          // accelerating dive
      y = horizontalY(1) - 24 * eased;  // continues from horizontal end, then plunges
      z = (PIPE_LENGTH - 12) + u * 12;
      // x continues from horizontal end with a tiny drift
      x = horizontalX(1) + Math.sin(u * Math.PI) * 2;
    }
    pathPoints.push(new THREE.Vector3(x, y, z));
  }
  const curve = new THREE.CatmullRomCurve3(pathPoints, false, "catmullrom", 0.5);
  const curveLength = curve.getLength();

  // station-T positions: cluster within the horizontal phase
  const FIRST_STATION_T = 0.12;
  const LAST_STATION_T  = 0.88;
  const stationT = stations.map((_, i) =>
    FIRST_STATION_T + (i / (N - 1)) * (LAST_STATION_T - FIRST_STATION_T)
  );

  // ----- Seabed (high res, dramatic terrain) -----
  const seabedGeo = new THREE.PlaneGeometry(900, PIPE_LENGTH + 500, 160, 360);
  const sbPos = seabedGeo.attributes.position;
  for (let i = 0; i < sbPos.count; i++) {
    const x = sbPos.getX(i), y = sbPos.getY(i);
    // base undulating sand
    let z = Math.sin(x * 0.07) * 1.2
          + Math.cos(y * 0.05) * 1.0
          + Math.sin(x * 0.3 + y * 0.2) * 0.4
          + Math.sin(x * 0.012 + y * 0.008) * 3.2
          + Math.cos(y * 0.018) * 1.4;
    // corridor where the pipe travels: cap height so pipe always sits above
    const ax = Math.abs(x);
    if (ax < 75) {
      z = Math.min(z, 1.6);
    } else {
      // rising side walls away from corridor (dramatic terrain)
      z += (ax - 75) / 10 * 5;
    }
    sbPos.setZ(i, z);
  }
  seabedGeo.computeVertexNormals();

  const sandTex = makeSandTexture(2048, 2048);
  sandTex.repeat.set(10, 50);
  const sandNormalTex = makeSandNormal(2048, 2048);
  sandNormalTex.repeat.set(10, 50);
  const seabedMat = new THREE.MeshStandardMaterial({
    map: sandTex,
    normalMap: sandNormalTex,
    normalScale: new THREE.Vector2(1.0, 1.0),
    color: 0xc2b8a8,
    roughness: 0.98, metalness: 0.0,
    envMapIntensity: 0.12
  });
  // inject animated caustics from curve-following camera
  seabedMat.onBeforeCompile = (sh) => {
    sh.uniforms.uTime = { value: 0 };
    sh.uniforms.uCamPos = { value: new THREE.Vector3() };
    sh.vertexShader = "varying vec3 vWPos;\n" + sh.vertexShader.replace(
      "#include <fog_vertex>",
      "#include <fog_vertex>\nvWPos = (modelMatrix * vec4(transformed,1.0)).xyz;"
    );
    sh.fragmentShader = `
      uniform float uTime;
      uniform vec3 uCamPos;
      varying vec3 vWPos;
      float hashC(vec2 p) { return fract(sin(dot(p, vec2(12.989, 78.233))) * 43758.5453); }
      float noiseC(vec2 p) {
        vec2 i = floor(p), f = fract(p);
        float a = hashC(i), b = hashC(i + vec2(1,0)), c = hashC(i + vec2(0,1)), d = hashC(i + vec2(1,1));
        vec2 u = f*f*(3.0-2.0*f);
        return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
      }
    ` + sh.fragmentShader.replace(
      "#include <dithering_fragment>",
      `#include <dithering_fragment>
       vec2 cuv = vWPos.xz * 0.05 + vec2(uTime * 0.06, uTime * 0.04);
       float c1 = noiseC(cuv);
       float c2 = noiseC(cuv * 2.4 + 3.2);
       float caustic = pow(c1 * c2, 2.6) * 1.4;
       float dist = clamp(1.0 - distance(vWPos.xz, uCamPos.xz) / 90.0, 0.0, 1.0);
       gl_FragColor.rgb += vec3(0.35, 0.55, 0.78) * caustic * dist * 0.7;
      `
    );
    seabedMat.userData.shader = sh;
  };
  const seabed = new THREE.Mesh(seabedGeo, seabedMat);
  seabed.rotation.x = -Math.PI / 2;
  seabed.position.y = -8;
  seabed.position.z = PIPE_LENGTH / 2;
  scene.add(seabed);

  // ----- Rocks & boulders -----
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x3a342c, roughness: 1, metalness: 0, envMapIntensity: 0.15 });
  const rockMatLite = new THREE.MeshStandardMaterial({ color: 0x4a4339, roughness: 1, metalness: 0, envMapIntensity: 0.15 });
  const rockGeos = [
    new THREE.IcosahedronGeometry(1.0, 1),
    new THREE.DodecahedronGeometry(1.2, 0),
    new THREE.OctahedronGeometry(1.0, 1)
  ];
  // displace vertices for irregular look
  rockGeos.forEach(g => {
    const p = g.attributes.position;
    for (let i = 0; i < p.count; i++) {
      const v = new THREE.Vector3().fromBufferAttribute(p, i);
      v.multiplyScalar(0.85 + Math.random() * 0.4);
      p.setXYZ(i, v.x, v.y, v.z);
    }
    g.computeVertexNormals();
  });
  // dense scatter of pebbles all around (real seabed has lots of small debris)
  for (let i = 0; i < 900; i++) {
    const mat = Math.random() < 0.5 ? rockMat : rockMatLite;
    const r = new THREE.Mesh(rockGeos[i % rockGeos.length], mat);
    const offCenter = Math.random() < 0.65;
    r.position.set(
      offCenter ? ((Math.random() < 0.5 ? -1 : 1) * (6 + Math.random() * 120)) : (Math.random() - 0.5) * 36,
      -7.4 + Math.random() * 1.0,
      Math.random() * PIPE_LENGTH
    );
    const s = 0.25 + Math.random() * 2.2;
    r.scale.set(s, s * (0.45 + Math.random() * 0.45), s);
    r.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    scene.add(r);
  }
  // helper: x position of the pipe at a given world z (used to keep big objects clear of it)
  function pipeXAtZ(z) {
    if (z < 12) return 0;                                   // descent zone
    if (z > PIPE_LENGTH - 12) return horizontalX(1);        // burrow zone
    const u = (z - 12) / (PIPE_LENGTH - 24);
    return horizontalX(u);
  }

  // a few large dramatic boulders — pushed clear of the pipe corridor
  for (let i = 0; i < 14; i++) {
    const r = new THREE.Mesh(rockGeos[i % rockGeos.length], rockMatLite);
    const s = 4 + Math.random() * 7;
    let bx, bz, attempts = 0;
    do {
      bz = Math.random() * PIPE_LENGTH;
      const sign = Math.random() < 0.5 ? -1 : 1;
      bx = sign * (40 + Math.random() * 80);
      attempts++;
    } while (Math.abs(bx - pipeXAtZ(bz)) < s + 8 && attempts < 12);
    r.position.set(bx, -5.5 + Math.random() * 2, bz);
    r.scale.set(s, s * 0.65, s);
    r.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    scene.add(r);
  }

  // === Deep-sea biota: shells, sea pens, tube worms, sea cucumbers, brittle stars ===
  const biotaGroup = new THREE.Group();
  scene.add(biotaGroup);

  // Scattered shells (curved discs, lying on sediment)
  const shellMat = new THREE.MeshStandardMaterial({
    color: 0xb8a890, roughness: 0.6, metalness: 0.05, envMapIntensity: 0.25
  });
  const shellGeo = new THREE.SphereGeometry(1, 14, 8, 0, Math.PI * 2, 0, Math.PI / 2.4);
  for (let i = 0; i < 220; i++) {
    const sh = new THREE.Mesh(shellGeo, shellMat);
    sh.position.set(
      (Math.random() < 0.5 ? -1 : 1) * (4 + Math.random() * 110),
      -7.55 + Math.random() * 0.3,
      Math.random() * PIPE_LENGTH
    );
    const s = 0.15 + Math.random() * 0.4;
    sh.scale.set(s, s * 0.35, s * (0.75 + Math.random() * 0.4));
    sh.rotation.set(
      Math.PI + (Math.random() - 0.5) * 0.6,
      Math.random() * Math.PI * 2,
      (Math.random() - 0.5) * 0.5
    );
    biotaGroup.add(sh);
  }

  // Sea pens (slender vertical stalks with feathery top — common deep-sea biota)
  const penStalkMat = new THREE.MeshStandardMaterial({
    color: 0xc88a72, roughness: 0.55, metalness: 0.0, envMapIntensity: 0.25
  });
  const penPlumeMat = new THREE.MeshStandardMaterial({
    color: 0xd06854, roughness: 0.7, metalness: 0.0, envMapIntensity: 0.2,
    transparent: true, opacity: 0.85
  });
  const penStalkGeo = new THREE.CylinderGeometry(0.04, 0.07, 1.4, 6);
  const penPlumeGeo = new THREE.ConeGeometry(0.22, 0.9, 8);
  const sePens = [];
  for (let i = 0; i < 90; i++) {
    const g = new THREE.Group();
    const stalk = new THREE.Mesh(penStalkGeo, penStalkMat);
    stalk.position.y = 0.7;
    g.add(stalk);
    const plume = new THREE.Mesh(penPlumeGeo, penPlumeMat);
    plume.position.y = 1.6;
    g.add(plume);

    g.position.set(
      (Math.random() < 0.5 ? -1 : 1) * (5 + Math.random() * 100),
      -7.5,
      Math.random() * PIPE_LENGTH
    );
    const s = 0.6 + Math.random() * 0.7;
    g.scale.setScalar(s);
    g.rotation.y = Math.random() * Math.PI * 2;
    biotaGroup.add(g);
    sePens.push({ group: g, phase: Math.random() * Math.PI * 2, base: g.rotation.z });
  }

  // Tube-worm clusters (small bundles of straight tubes sticking up)
  const wormMat = new THREE.MeshStandardMaterial({
    color: 0xe8d8c0, roughness: 0.7, metalness: 0.0, envMapIntensity: 0.2
  });
  const wormTopMat = new THREE.MeshStandardMaterial({
    color: 0xa84e3a, roughness: 0.55, metalness: 0.0, envMapIntensity: 0.2
  });
  const wormGeo = new THREE.CylinderGeometry(0.04, 0.05, 0.5, 6);
  const wormTopGeo = new THREE.SphereGeometry(0.07, 8, 6);
  for (let i = 0; i < 50; i++) {
    const cluster = new THREE.Group();
    const tubes = 6 + Math.floor(Math.random() * 10);
    for (let k = 0; k < tubes; k++) {
      const t = new THREE.Mesh(wormGeo, wormMat);
      t.position.set(
        (Math.random() - 0.5) * 0.4,
        0.25,
        (Math.random() - 0.5) * 0.4
      );
      t.rotation.z = (Math.random() - 0.5) * 0.25;
      t.rotation.x = (Math.random() - 0.5) * 0.25;
      cluster.add(t);
      const top = new THREE.Mesh(wormTopGeo, wormTopMat);
      top.position.copy(t.position);
      top.position.y = 0.5;
      cluster.add(top);
    }
    cluster.position.set(
      (Math.random() < 0.5 ? -1 : 1) * (4 + Math.random() * 80),
      -7.55,
      Math.random() * PIPE_LENGTH
    );
    cluster.scale.setScalar(0.7 + Math.random() * 0.7);
    biotaGroup.add(cluster);
  }

  // Sea cucumbers (elongated soft horizontal blobs)
  const cukeMat = new THREE.MeshStandardMaterial({
    color: 0x5a3a28, roughness: 0.8, metalness: 0.0, envMapIntensity: 0.2
  });
  // r128 has no CapsuleGeometry — fall back to a cylinder
  const cukeGeo = THREE.CapsuleGeometry
    ? new THREE.CapsuleGeometry(0.16, 0.5, 4, 8)
    : new THREE.CylinderGeometry(0.16, 0.16, 0.7, 8);
  for (let i = 0; i < 38; i++) {
    const cuke = new THREE.Mesh(cukeGeo, cukeMat);
    cuke.position.set(
      (Math.random() < 0.5 ? -1 : 1) * (5 + Math.random() * 90),
      -7.55,
      Math.random() * PIPE_LENGTH
    );
    cuke.rotation.z = Math.PI / 2;
    cuke.rotation.y = Math.random() * Math.PI * 2;
    cuke.scale.set(1 + Math.random() * 0.6, 1, 1);
    biotaGroup.add(cuke);
  }

  // Brittle stars — flat 5-arm silhouettes lying on the seabed
  const brittleStarMat = new THREE.MeshStandardMaterial({
    color: 0x8a6a48, roughness: 0.85, metalness: 0.0,
    side: THREE.DoubleSide, envMapIntensity: 0.18
  });
  function makeBrittleStarGeo() {
    const s = new THREE.Shape();
    const armN = 5;
    const outer = 0.9;
    const inner = 0.18;
    for (let i = 0; i < armN; i++) {
      const a = (i / armN) * Math.PI * 2;
      const a2 = ((i + 0.5) / armN) * Math.PI * 2;
      if (i === 0) s.moveTo(Math.cos(a) * outer, Math.sin(a) * outer);
      else s.lineTo(Math.cos(a) * outer, Math.sin(a) * outer);
      s.quadraticCurveTo(
        Math.cos(a + 0.15) * outer * 0.4, Math.sin(a + 0.15) * outer * 0.4,
        Math.cos(a2) * inner, Math.sin(a2) * inner
      );
      s.quadraticCurveTo(
        Math.cos(a2 + 0.15) * inner * 0.6, Math.sin(a2 + 0.15) * inner * 0.6,
        Math.cos(((i + 1) / armN) * Math.PI * 2) * outer,
        Math.sin(((i + 1) / armN) * Math.PI * 2) * outer
      );
    }
    return new THREE.ShapeGeometry(s);
  }
  const starGeo = makeBrittleStarGeo();
  for (let i = 0; i < 70; i++) {
    const st = new THREE.Mesh(starGeo, brittleStarMat);
    st.rotation.x = -Math.PI / 2;
    st.rotation.z = Math.random() * Math.PI * 2;
    st.position.set(
      (Math.random() < 0.5 ? -1 : 1) * (4 + Math.random() * 80),
      -7.6 + Math.random() * 0.1,
      Math.random() * PIPE_LENGTH
    );
    const s = 0.35 + Math.random() * 0.55;
    st.scale.setScalar(s);
    biotaGroup.add(st);
  }

  // ----- Pipeline tube (CWC subsea pipe) -----
  const REPEAT = Math.max(8, Math.round(curveLength / 30));
  const steelMap = makeSteelTexture(2048, 512);
  steelMap.repeat.set(REPEAT, 1);
  const steelRough = makeSteelRoughness(2048, 512);
  steelRough.repeat.set(REPEAT, 1);
  const steelNormal = makeSteelNormal(2048, 512);
  steelNormal.repeat.set(REPEAT, 1);
  const steelMetal = makeSteelMetalness(2048, 512);
  steelMetal.repeat.set(REPEAT, 1);

  const tubeGeo = new THREE.TubeGeometry(curve, 1100, pipeRadius, 64, false);
  // PBR: map drives color, metalness map masks steel-vs-concrete, roughness/normal sculpt the surface
  const pipeMat = new THREE.MeshPhysicalMaterial({
    map: steelMap,
    roughnessMap: steelRough,
    metalnessMap: steelMetal,
    normalMap: steelNormal,
    normalScale: new THREE.Vector2(1.15, 1.15),
    color: 0xffffff,
    roughness: 1.0,
    metalness: 1.0,
    envMapIntensity: 1.0,
    clearcoat: 0.12,
    clearcoatRoughness: 0.75
  });
  const pipe = new THREE.Mesh(tubeGeo, pipeMat);
  scene.add(pipe);

  // inner shell (darker, for solid look at end caps)
  const tubeInnerGeo = new THREE.TubeGeometry(curve, 700, pipeRadius * 0.97, 24, false);
  const pipeInner = new THREE.Mesh(
    tubeInnerGeo,
    new THREE.MeshBasicMaterial({ color: 0x070d18, side: THREE.BackSide })
  );
  scene.add(pipeInner);

  // end caps (oriented to tangent at curve ends)
  function placeCap(t01) {
    const p = curve.getPointAt(t01);
    const tan = curve.getTangentAt(t01);
    const cap = new THREE.Mesh(
      new THREE.CircleGeometry(pipeRadius, 36),
      new THREE.MeshStandardMaterial({ color: 0x4d5963, roughness: 0.5, metalness: 0.8 })
    );
    cap.position.copy(p);
    cap.lookAt(p.clone().add(tan));
    if (t01 < 0.5) cap.rotateY(Math.PI);
    scene.add(cap);
  }
  placeCap(0.0001);
  placeCap(0.9999);

  // ----- Weld bead rings along curve every ~12 m -----
  const weldGeo = new THREE.TorusGeometry(pipeRadius * 1.025, 0.085, 16, 48);
  const weldMat = new THREE.MeshPhysicalMaterial({
    color: 0x9ba6b1, roughness: 0.35, metalness: 0.9,
    envMapIntensity: 1.2, clearcoat: 0.3, clearcoatRoughness: 0.6
  });
  const nWelds = Math.floor(curveLength / 12);
  for (let i = 1; i < nWelds; i++) {
    const t = i / nWelds;
    const p = curve.getPointAt(t);
    const tan = curve.getTangentAt(t);
    const w = new THREE.Mesh(weldGeo, weldMat);
    w.position.copy(p);
    w.lookAt(p.clone().add(tan));
    scene.add(w);
  }

  // (Flange rings removed — real subsea CWC pipelines are continuously welded,
  // not flanged every 60 m. Only the field-joint welds remain.)

  // ----- Station markers (small dot + connecting line + spec sprite) -----
  const dotMat = new THREE.MeshBasicMaterial({ color: 0xffb547 });
  const lineMat = new THREE.LineBasicMaterial({
    color: 0xffb547, transparent: true, opacity: 0.55
  });
  const stationGroups = [];
  stations.forEach((s, i) => {
    const t = stationT[i];
    const p = curve.getPointAt(t);
    const tan = curve.getTangentAt(t);
    const up = new THREE.Vector3(0, 1, 0);
    const side = new THREE.Vector3().crossVectors(tan, up).normalize();
    const upPerp = new THREE.Vector3().crossVectors(side, tan).normalize();

    // anchor point on pipe surface (top)
    const anchor = p.clone().addScaledVector(upPerp, pipeRadius);

    // sprite position directly above the pipe (so it floats over the curve cleanly)
    const spritePos = p.clone().addScaledVector(upPerp, 10);

    const group = new THREE.Group();

    // glowing dot on pipe
    const dot = new THREE.Mesh(new THREE.SphereGeometry(0.18, 14, 10), dotMat);
    dot.position.copy(anchor);
    group.add(dot);

    // halo ring around dot (faces tangent)
    const halo = new THREE.Mesh(
      new THREE.RingGeometry(0.32, 0.5, 24),
      new THREE.MeshBasicMaterial({
        color: 0xffb547, transparent: true, opacity: 0.55,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending, depthWrite: false
      })
    );
    halo.position.copy(anchor);
    halo.lookAt(anchor.clone().add(upPerp));
    group.add(halo);

    // small point light at the anchor for local glow
    const pl = new THREE.PointLight(0xffb547, 0.8, 14, 2);
    pl.position.copy(anchor).addScaledVector(upPerp, 0.3);
    group.add(pl);

    // line from anchor up to sprite
    const lineGeo = new THREE.BufferGeometry().setFromPoints([anchor, spritePos]);
    const line = new THREE.Line(lineGeo, lineMat);
    group.add(line);

    // spec sprite
    const sprite = makeSpecSprite(s);
    sprite.position.copy(spritePos);
    group.add(sprite);

    scene.add(group);
    stationGroups.push({ group, dot, halo, light: pl, sprite, t, anchor, spritePos });
  });

  // ----- Marine snow particles -----
  const snowCount = 1400;
  const snowGeo = new THREE.BufferGeometry();
  const snowPos = new Float32Array(snowCount * 3);
  for (let i = 0; i < snowCount; i++) {
    snowPos[i * 3]     = (Math.random() - 0.5) * 160;
    snowPos[i * 3 + 1] = -8 + Math.random() * 45;
    snowPos[i * 3 + 2] = Math.random() * PIPE_LENGTH;
  }
  snowGeo.setAttribute("position", new THREE.BufferAttribute(snowPos, 3));
  const snowMat = new THREE.PointsMaterial({
    color: 0xc2d6e6, size: 0.11, transparent: true, opacity: 0.55,
    sizeAttenuation: true, depthWrite: false, map: makeNoiseAlpha(8, 8)
  });
  const snow = new THREE.Points(snowGeo, snowMat);
  scene.add(snow);

  // close particulates
  const closeCount = 260;
  const closeGeo = new THREE.BufferGeometry();
  const closePos = new Float32Array(closeCount * 3);
  for (let i = 0; i < closeCount; i++) {
    closePos[i * 3]     = (Math.random() - 0.5) * 40;
    closePos[i * 3 + 1] = -4 + Math.random() * 22;
    closePos[i * 3 + 2] = Math.random() * PIPE_LENGTH;
  }
  closeGeo.setAttribute("position", new THREE.BufferAttribute(closePos, 3));
  const closeMat = new THREE.PointsMaterial({
    color: 0xffffff, size: 0.2, transparent: true, opacity: 0.5,
    sizeAttenuation: true, depthWrite: false
  });
  const closeSnow = new THREE.Points(closeGeo, closeMat);
  scene.add(closeSnow);

  // bubbles
  const bubbleCount = 220;
  const bubbleGeo = new THREE.BufferGeometry();
  const bubblePos = new Float32Array(bubbleCount * 3);
  const bubbleData = [];
  for (let i = 0; i < bubbleCount; i++) {
    bubblePos[i * 3]     = (Math.random() - 0.5) * 36;
    bubblePos[i * 3 + 1] = -7 + Math.random() * 30;
    bubblePos[i * 3 + 2] = Math.random() * PIPE_LENGTH;
    bubbleData.push({ speed: 0.05 + Math.random() * 0.18, x: bubblePos[i*3] });
  }
  bubbleGeo.setAttribute("position", new THREE.BufferAttribute(bubblePos, 3));
  const bubbleMat = new THREE.PointsMaterial({
    color: 0xffffff, size: 0.18, transparent: true, opacity: 0.7,
    sizeAttenuation: true, depthWrite: false
  });
  const bubbles = new THREE.Points(bubbleGeo, bubbleMat);
  scene.add(bubbles);

  // ----- Camera follow ----
  function followCurve(progress) {
    const t = Math.max(0.001, Math.min(0.999, progress));
    // small look-behind to put us slightly behind current point, look ahead to anticipate
    const back = Math.max(0.001, t - 0.012);
    const ahead = Math.min(0.999, t + 0.022);
    const pBack = curve.getPointAt(back);
    const pAhead = curve.getPointAt(ahead);
    const tan = curve.getTangentAt(t).normalize();
    const up = new THREE.Vector3(0, 1, 0);
    let side = new THREE.Vector3().crossVectors(tan, up);
    if (side.lengthSq() < 0.01) side.set(-1, 0, 0);
    side.normalize();
    // camera offset: above pipe, off to the side so pipe sits left of frame
    const camPos = pBack.clone()
      .addScaledVector(up, 4.2)
      .addScaledVector(side, -4.6)
      .addScaledVector(tan, -6);
    // never dive below the seabed: clamp camera height
    if (camPos.y < -3) camPos.y = -3;
    const lookAt = pAhead.clone().addScaledVector(up, 0.4);
    return { camPos, lookAt };
  }

  // ----- Scroll handling -----
  const track = document.getElementById("track");
  const progressBar = document.getElementById("progressBar");
  const depthValue = document.getElementById("depthValue");
  const kpValue = document.getElementById("kpValue");
  const hint = document.getElementById("hint");

  track.style.height = (N * 110) + "vh";

  let scrollProgress = 0, targetProgress = 0;
  const startDepth = 77, maxDepth = 3200, maxKP = 24.0;

  // computed once initial values exist (see init block below)
  let minScrollY = 0;
  function onScroll() {
    if (window.scrollY < minScrollY) {
      window.scrollTo({ top: minScrollY, behavior: "auto" });
      return;
    }
    const total = track.offsetHeight - window.innerHeight;
    targetProgress = Math.max(0, Math.min(1, window.scrollY / total));
    hint.classList.toggle("hidden", targetProgress > 0.02);
  }
  window.addEventListener("scroll", onScroll, { passive: true });

  function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
  window.addEventListener("resize", onResize);

  let mouseX = 0, mouseY = 0;
  window.addEventListener("mousemove", (e) => {
    mouseX = e.clientX / window.innerWidth - 0.5;
    mouseY = e.clientY / window.innerHeight - 0.5;
  });

  // ----- Animate -----
  let t = 0;
  let activeIdx = -1;
  const clock = new THREE.Clock();
  function tick() {
    requestAnimationFrame(tick);
    const dt = Math.min(clock.getDelta(), 0.05);
    t += dt;

    scrollProgress += (targetProgress - scrollProgress) * 0.08;

    // camera follows curve
    const { camPos, lookAt } = followCurve(scrollProgress);
    // gentle mouse parallax
    camPos.x += mouseX * 1.4;
    camPos.y += mouseY * 0.6 + Math.sin(t * 0.3) * 0.15;
    camera.position.copy(camPos);
    camera.lookAt(lookAt);
    // Camera-mounted lights follow the camera and point along view direction
    camFill.position.copy(camera.position);
    camWash.position.copy(camera.position);
    rovSpot.position.copy(camera.position);
    const _viewDir = new THREE.Vector3();
    camera.getWorldDirection(_viewDir);
    rovTarget.position.copy(camera.position).addScaledVector(_viewDir, 20);
    rovTarget.updateMatrixWorld();

    // UI
    progressBar.style.width = (scrollProgress * 100) + "%";
    depthValue.textContent = Math.round(startDepth + scrollProgress * (maxDepth - startDepth)).toLocaleString();
    kpValue.textContent = (scrollProgress * maxKP).toFixed(2);

    // active station detection
    let newActive;
    const firstT = stationT[0], lastT = stationT[N - 1];
    if (scrollProgress <= firstT) {
      newActive = 0; // hero stays active during the descent intro
    } else if (scrollProgress >= lastT) {
      newActive = N - 1; // final stays active during the burrow outro
    } else {
      let closestI = 0, closestD = Infinity;
      for (let i = 0; i < stationGroups.length; i++) {
        const d = Math.abs(stationGroups[i].t - scrollProgress);
        if (d < closestD) { closestD = d; closestI = i; }
      }
      newActive = closestI;
    }
    if (newActive !== activeIdx) {
      activeIdx = newActive;
      cards.forEach((c, i) => c.classList.toggle("active", i === activeIdx));
      navBtns.forEach((b, i) => b.classList.toggle("active", i === activeIdx));
    }

    // station marker animations
    stationGroups.forEach((sg, i) => {
      const isActive = i === activeIdx;
      const pulse = 1 + Math.sin(t * 2 + i * 0.5) * 0.2;
      sg.dot.scale.setScalar(pulse);
      sg.halo.material.opacity = isActive ? 0.85 : 0.4;
      sg.halo.scale.setScalar(1 + Math.sin(t * 1.4 + i) * 0.15 + (isActive ? 0.4 : 0));
      sg.light.intensity = isActive ? 1.6 : 0.5;
      // sprite slight bobbing
      sg.sprite.position.y = sg.spritePos.y + Math.sin(t * 0.8 + i * 0.5) * 0.18;
    });

    // seabed caustics shader update
    if (seabedMat.userData.shader) {
      seabedMat.userData.shader.uniforms.uTime.value = t;
      seabedMat.userData.shader.uniforms.uCamPos.value.copy(camera.position);
    }

    // Sea pens sway gently in the current
    for (let i = 0; i < sePens.length; i++) {
      const p = sePens[i];
      p.group.rotation.z = Math.sin(t * 0.8 + p.phase) * 0.18;
      p.group.rotation.x = Math.cos(t * 0.7 + p.phase) * 0.10;
    }

    // marine snow drift
    const sp = snow.geometry.attributes.position.array;
    const camZ = camera.position.z;
    for (let i = 0; i < snowCount; i++) {
      sp[i * 3 + 1] -= 0.018 + (i % 3) * 0.003;
      sp[i * 3]     += Math.sin(t * 0.4 + i) * 0.004;
      if (sp[i * 3 + 1] < -8) {
        sp[i * 3 + 1] = 42;
        sp[i * 3]     = camera.position.x + (Math.random() - 0.5) * 160;
        sp[i * 3 + 2] = camZ + (Math.random() - 0.5) * 160;
      }
    }
    snow.geometry.attributes.position.needsUpdate = true;

    // close snow recycles around camera
    const cp = closeSnow.geometry.attributes.position.array;
    for (let i = 0; i < closeCount; i++) {
      cp[i * 3 + 1] -= 0.04;
      cp[i * 3]     += Math.sin(t * 1.0 + i) * 0.01;
      if (cp[i * 3 + 1] < -5 || Math.abs(cp[i * 3 + 2] - camZ) > 35) {
        cp[i * 3 + 1] = 16 + Math.random() * 6;
        cp[i * 3]     = camera.position.x + (Math.random() - 0.5) * 40;
        cp[i * 3 + 2] = camZ + (Math.random() - 0.5) * 50;
      }
    }
    closeSnow.geometry.attributes.position.needsUpdate = true;

    // bubbles rise
    const bp = bubbles.geometry.attributes.position.array;
    for (let i = 0; i < bubbleCount; i++) {
      bp[i * 3 + 1] += bubbleData[i].speed;
      bp[i * 3]     += Math.sin(t * 1.4 + i) * 0.01;
      if (bp[i * 3 + 1] > 26) {
        bp[i * 3 + 1] = -7;
        bp[i * 3]     = camera.position.x + (Math.random() - 0.5) * 30;
        bp[i * 3 + 2] = camZ + (Math.random() - 0.5) * 80;
      }
    }
    bubbles.geometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
  }

  // Start the page already descended — skip the empty water above so the
  // first thing you see is the pipeline already in frame (depth ≈ 156 m).
  const initialDepth = 156;
  const initialProgress = Math.max(0, Math.min(1,
    (initialDepth - startDepth) / (maxDepth - startDepth)
  ));
  const totalScrollPx = track.offsetHeight - window.innerHeight;
  minScrollY = initialProgress * totalScrollPx;
  window.scrollTo(0, minScrollY);
  scrollProgress = initialProgress;
  targetProgress = initialProgress;

  onScroll();
  tick();
  setTimeout(() => document.getElementById("loader").classList.add("gone"), 800);
</script>
</body>
</html>
