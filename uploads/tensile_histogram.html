<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tensile Histogram — Animated</title>
<style>
  :root{
    --bg:#ffffff; --text-secondary:#5f5e5a; --text-primary:#2c2c2a;
  }
  body{ margin:0; background:var(--bg); color:var(--text-primary);
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  .wrap{ max-width:980px; margin:24px auto; padding:0 16px; }
  .legend{ display:flex; align-items:center; justify-content:center; gap:24px; margin-bottom:6px;
           font-size:13px; color:var(--text-secondary); }
  .legend span{ display:flex; align-items:center; gap:6px; }
  .title{ text-align:center; font-weight:500; font-size:18px; margin-bottom:4px; }
  canvas{ width:100%; display:block; }
  .controls{ text-align:center; margin-top:10px; display:flex; gap:8px; justify-content:center; }
  button{ font-size:13px; padding:6px 12px; border:0.5px solid rgba(0,0,0,0.3);
          background:transparent; border-radius:8px; cursor:pointer; }
  button:hover{ background:rgba(0,0,0,0.05); }
  button:active{ transform:scale(0.98); }
</style>
</head>
<body>
<div class="wrap">
  <div class="legend">
    <span><span style="width:22px;height:0;border-top:2.5px solid #6b2c8f;"></span>Probability density function</span>
    <span><span style="width:16px;height:12px;background:#9ad2e6;border:1px solid #4fa3c4;border-radius:2px;"></span>Frequency</span>
  </div>
  <div class="title">Tensile histogram</div>
  <canvas id="th-canvas" role="img" aria-label="Histogram with a wide purple curve sitting just above the bar tops, a few bars changing every five seconds."></canvas>
  <div class="controls">
    <button id="th-replay">Replay &#x21bb;</button>
    <button id="th-drift">Pause motion &#10073;&#10073;</button>
  </div>
</div>
<script>
(function(){
  const canvas = document.getElementById('th-canvas');
  const ctx = canvas.getContext('2d');
  const W = 920, H = 470;
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  canvas.width = W*dpr; canvas.height = H*dpr;
  function fit(){ canvas.style.height = (H * (canvas.clientWidth/W)) + 'px'; }
  ctx.scale(dpr,dpr);

  const mPurple = '#6b2c8f', mRed = '#e23b3b', mBarFill = '#9ad2e6', mBarStroke='#4fa3c4';
  const txt = '#5f5e5a';
  const grid = 'rgba(140,140,140,0.18)';

  const pad = {l:55, r:30, t:20, b:50};
  const px0 = pad.l, px1 = W-pad.r, py0 = pad.t, py1 = H-pad.b;
  const xMin=436.2, xMax=575, yMin=0, yMax=33;
  const X = v => px0 + (v-xMin)/(xMax-xMin)*(px1-px0);
  const Y = v => py1 - (v-yMin)/(yMax-yMin)*(py1-py0);

  const heights=[10,25,21,30,12,14,8,3,3];
  const start=452, bw=6.8;
  const bins=heights.map((h,i)=>({x0:start+i*bw, x1:start+(i+1)*bw, c:start+(i+0.5)*bw, h}));

  const xTicks=[436.2,460,480,500,520,540,560,570];
  const yTicks=[0,5,10,15,20,25,30,33];
  const CURVE_LIFT=2.0;
  const Y_CAP=yMax-0.6;
  const TAIL=2.6;

  function easeOut(t){return 1-Math.pow(1-t,3);}

  function drawStaticChart(){
    ctx.clearRect(0,0,W,H);
    ctx.font='14px sans-serif';
    ctx.strokeStyle=grid; ctx.lineWidth=1;
    yTicks.forEach(t=>{ const y=Y(t); ctx.beginPath(); ctx.moveTo(px0,y); ctx.lineTo(px1,y); ctx.stroke();
      ctx.textAlign='right'; ctx.textBaseline='middle'; ctx.fillStyle=txt; ctx.fillText(t,px0-8,y); });
    ctx.strokeStyle=grid; ctx.lineWidth=1;
    xTicks.forEach(t=>{ const x=X(t); ctx.beginPath(); ctx.moveTo(x,py0); ctx.lineTo(x,py1); ctx.stroke(); });
    ctx.fillStyle=txt; ctx.textBaseline='top'; ctx.textAlign='center';
    xTicks.forEach(t=>{ ctx.fillText(t, X(t), py1+8); });
    ctx.strokeStyle='rgba(120,120,120,0.5)'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(px0,py0); ctx.lineTo(px0,py1); ctx.lineTo(px1,py1); ctx.stroke();
    ctx.fillStyle=txt; ctx.textBaseline='top'; ctx.textAlign='center';
    ctx.fillText('Yield Strength [MPa]', (px0+px1)/2, H-22);
  }

  function drawLimits(){
    [[450,'450'],[570,'570']].forEach(([v,lbl])=>{
      const x=X(v);
      ctx.strokeStyle=mRed; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(x,py1); ctx.lineTo(x,py0); ctx.stroke();
      ctx.fillStyle=mRed; const bw2=42,bh=26,by=Y(16.5);
      ctx.beginPath(); ctx.roundRect(x-bw2/2,by-bh/2,bw2,bh,6); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='600 15px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(lbl,x,by);
    });
  }

  function drawBars(vals){
    vals.forEach(v=>{
      if(v.val<=0) return;
      const x=X(v.x0), w=X(v.x1)-X(v.x0);
      const h=py1-Y(v.val);
      ctx.fillStyle=mBarFill; ctx.strokeStyle=mBarStroke; ctx.lineWidth=1;
      ctx.beginPath(); ctx.rect(x, py1-h, w, h); ctx.fill(); ctx.stroke();
    });
  }

  function drawCurve(vals, frac){
    const pts=[];
    pts.push({x:vals[0].c-TAIL*2*bw, y:0.05});
    pts.push({x:vals[0].c-TAIL*bw, y:0.8});
    vals.forEach(v=>pts.push({x:v.c, y:Math.min(Y_CAP, v.val+CURVE_LIFT)}));
    pts.push({x:vals[vals.length-1].c+TAIL*bw, y:0.8});
    pts.push({x:vals[vals.length-1].c+TAIL*2*bw, y:0.05});
    const sp=[];
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[i===0?0:i-1], p1=pts[i], p2=pts[i+1], p3=pts[i+2>pts.length-1?pts.length-1:i+2];
      for(let t=0;t<1;t+=0.04){
        const t2=t*t,t3=t2*t;
        const x=0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3);
        let y=0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3);
        y=Math.max(0,Math.min(Y_CAP,y));
        sp.push({x,y});
      }
    }
    const cut = Math.max(2, Math.floor(sp.length*(frac==null?1:frac)));
    ctx.save(); ctx.beginPath(); ctx.rect(px0,py0,px1-px0,py1-py0+2); ctx.clip();
    ctx.strokeStyle=mPurple; ctx.lineWidth=3; ctx.lineJoin='round'; ctx.beginPath();
    for(let i=0;i<cut;i++){ const px=X(sp[i].x), py=Y(sp[i].y); if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py); }
    ctx.stroke(); ctx.restore();
  }

  const T_BARS=900, T_CURVE=900, GAP=120;
  const curveStart=T_BARS+GAP, buildEnd=curveStart+T_CURVE+200;
  const HOLD=5000, LERP=0.10;

  const disp = bins.map(()=>1), target = bins.map(()=>1);

  function scheduleChange(){
    const n = 1 + Math.floor(Math.random()*3);
    const idx = [...bins.keys()];
    for(let i=idx.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
    for(let k=0;k<n;k++){ target[idx[k]] = 0.45 + Math.random()*0.55; }
  }

  function valsFromDisp(grow){
    return bins.map((b,i)=>{
      const k = grow ? easeOut(Math.min(1, Math.max(0,(grow.e-i*60)/600))) : 1;
      return { c:b.c, x0:b.x0, x1:b.x1, val:b.h*disp[i]*k };
    });
  }

  let startTime=null, on=true, lastChange=0, builtAt=null;

  function render(now){
    if(!startTime) startTime=now;
    const e=now-startTime;

    if(e<buildEnd){
      drawStaticChart(); drawLimits();
      const vals=valsFromDisp({e});
      drawBars(vals);
      if(e>curveStart) drawCurve(vals, Math.min(1,(e-curveStart)/T_CURVE));
      requestAnimationFrame(render);
      return;
    }
    if(builtAt===null){ builtAt=now; lastChange=now; }

    if(on){
      if(now-lastChange>=HOLD){ scheduleChange(); lastChange=now; }
      for(let i=0;i<disp.length;i++){ disp[i]+=(target[i]-disp[i])*LERP; }
    }

    drawStaticChart(); drawLimits();
    const vals=valsFromDisp(null);
    drawBars(vals);
    drawCurve(vals, 1);
    requestAnimationFrame(render);
  }

  function play(){ startTime=null; builtAt=null; for(let i=0;i<disp.length;i++){disp[i]=1;target[i]=1;} requestAnimationFrame(render); }
  document.getElementById('th-replay').addEventListener('click',play);
  const dbtn=document.getElementById('th-drift');
  dbtn.addEventListener('click',()=>{ on=!on; dbtn.innerHTML = on ? 'Pause motion &#10073;&#10073;' : 'Resume motion &#9654;'; });

  window.addEventListener('resize', fit);
  fit();
  drawStaticChart(); drawLimits();
  setTimeout(play,200);
})();
</script>
</body>
</html>
