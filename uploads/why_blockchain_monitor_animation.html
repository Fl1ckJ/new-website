<script>
(function(){
var caps=[
{q:'Why blockchain? A record is only as good as the trust behind it. Blockchain is how SteelTrace makes every signature and every data point independently verifiable.',a:null},
{q:'How can we make sure the people who signed are who they say they are — and qualified?',a:'Foolproof digital identities and signatures, cryptographically stored and ensured.'},
{q:'How can we make sure data cannot be modified after it’s endorsed?',a:'Everything is always traceable — who signed what, at what point in time.'},
{q:'How can we make sure only original manufacturers can create certificates in their name?',a:'Unqualified users can’t create certificates — only the right people can endorse data, e.g. inspectors and level-3 QAs.'},
{q:'…and that all of the above can be independently verified — without exposing the data itself?',a:'Anyone can independently verify data is authentic and unchanged — while the data itself stays private.'}
];
var scenes=['w0','w1','w2','w3','w4'].map(function(id){return document.getElementById(id);});
var cap=document.getElementById('cap');
var dots=[].slice.call(document.querySelectorAll('.sdot'));
var reduced=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var i=0,HOLD=9200,GAP=600;
function setCap(t,quoted){cap.textContent=t;cap.style.fontStyle=quoted?'normal':'normal';}
function show(idx){
cap.style.opacity='1';setCap(caps[idx].q);
dots.forEach(function(d,k){d.classList.toggle('on',k===idx);});
scenes[idx].classList.add('on');
if(caps[idx].a){
setTimeout(function(){
cap.style.opacity='0';
setTimeout(function(){setCap(caps[idx].a);cap.style.opacity='1';},320);
},reduced?3000:4600);
}
setTimeout(function(){
scenes[idx].classList.remove('on');
cap.style.opacity='0';
setTimeout(function(){i=(i+1)%5;show(i);},GAP);
},reduced?6000:HOLD);
}
show(0);
})();
</script>
